      { id:'p14', bank:'LINXEA Spirit 114503609',      accountType:'id France smidcaps',   supportType:'obligations' },
      { id:'p15', bank:'LINXEA Avenir 265571491',      accountType:'ETF NASDAQ x2',        supportType:'obligations' },

    const DEFAULT_PARAMS = {

      inflation2056to2200: 2.5,
      yieldsByYear: { 2026:-15, 2027:15, 2028:15, 2029:15, 2030:-15, 2031:15, 2032:15, 2033:15, 2034:15, 2035:-15 },
      yield2036_2045: 6,
      yield2045_2060: 6,
      yield2060_2078: 6,
      taxRateTitres: 30,
      eduPricePerYear: 0, eduDuration: 0, eduChild1StartYear: 0, eduChild2StartYear: 0,
      donations: [],
      otherIncomes: [
        { id:'inc-retraite',   label:'Retraite',           startMonth:1, startYear:2048, endYear:2078, endMonth:12, initialMonthlyAmount:1000,   annualGrowthRate:2.5, taxRate:0 },
        { id:'inc-lille',      label:'Lille',              startMonth:1, startYear:2026, endYear:2078, endMonth:12, initialMonthlyAmount:1000,   annualGrowthRate:1.5, taxRate:0 },
        { id:'inc-airbnb',     label:'Airbnb',             startMonth:1, startYear:2026, endYear:2048, endMonth:12, initialMonthlyAmount:1000,   annualGrowthRate:1,   taxRate:0 },
        { id:'inc-airbnb-temp',label:'Airbnb temporaire',  startMonth:1, startYear:2026, endYear:2035, endMonth:10, initialMonthlyAmount:300,    annualGrowthRate:0,   taxRate:0 },
        { id:'inc-don1',       label:'Don 1',              startMonth:1, startYear:2048, endYear:2048, endMonth:1,  initialMonthlyAmount:500000, annualGrowthRate:0,   taxRate:0 },
        { id:'inc-don2',       label:'Don 2',              startMonth:1, startYear:2048, endYear:2048, endMonth:1,  initialMonthlyAmount:0,      annualGrowthRate:0,   taxRate:0 },
      ],
      otherExpenses: [
        { id:'exp-camille',       label:'Etudes Camille',       startMonth:1, startYear:2035, endYear:2039, endMonth:12, initialMonthlyAmount:1500,  annualGrowthRate:0 },
        { id:'exp-anna',          label:'Etudes Anna',          startMonth:1, startYear:2037, endYear:2041, endMonth:12, initialMonthlyAmount:1500,  annualGrowthRate:0 },
        { id:'exp-voiture-2035',  label:'Achat de voiture (2035)', startMonth:1, startYear:2035, endYear:2035, endMonth:1, initialMonthlyAmount:10000, annualGrowthRate:0 },
        { id:'exp-voiture-2048',  label:'Achat de voiture (2048)', startMonth:1, startYear:2048, endYear:2048, endMonth:1, initialMonthlyAmount:10000, annualGrowthRate:0 },
      ],
      loans: [
        { id:'loan-lille', label:'Emprunt 1 (Lille)', startMonth:1, startYear:2026, endMonth:2,  endYear:2030, monthlyPayment:2700 },
        { id:'loan-stjo',  label:'Emprunt 2 (St Jo)', startMonth:1, startYear:2026, endMonth:10, endYear:2035, monthlyPayment:2600 },
      ],
      annualBaseExpenses2026: 30000,
    };

    // ─── ENGINE ──────────────────────────────────────────────────────────────────

    function fmtE(val) { return new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0}).format(val)+'€'; }
    function fmtP(val) { return val.toLocaleString('fr-FR',{minimumFractionDigits:1,maximumFractionDigits:4})+'%'; }

    function calculateProjection(params, withDetails = true) {
      const results = [];
      let peaWealth     = params.initialPEAWealth;
      let cashWealth    = params.cashBuffer;
      let accountWealth = params.initialWealth - cashWealth - peaWealth;
      let accumulatedTaxLosses = params.initialTaxLosses;

      const startYear  = 2026, endYear = 2078;
      const totalMonths = (endYear - startYear + 1) * 12;
      let cumulativeInflationMult = 1;

      const taxRateTitresFactor   = params.taxRateTitres / 100;
      const taxRatePEAFactor      = params.taxRatePEA / 100;
      const invTaxRatePEAFactor   = 1 - taxRatePEAFactor;
      const baseExpensesMonthly   = params.annualBaseExpenses2026 / 12;

      for (let m = 0; m < totalMonths; m++) {
        const year  = startYear + Math.floor(m / 12);
        const month = (m % 12) + 1;
        const age   = params.currentAge + Math.floor(m / 12);

        const explanations    = {};
        const customIncomes   = {};
        const customExpenses  = {};

        let annualYield = 0;
        if (year <= 2035)      annualYield = params.yieldsByYear[year] ?? 6;
        else if (year <= 2045) annualYield = params.yield2036_2045;
        else if (year <= 2060) annualYield = params.yield2045_2060;
        else                   annualYield = params.yield2060_2078;

        const annualRate  = annualYield / 100;
        const monthlyRate = annualRate / 12;

        const curInf = year <= 2035 ? params.inflationUntil2035 : year <= 2055 ? params.inflation2035to2055 : params.inflation2056to2200;
        if (m > 0) cumulativeInflationMult *= Math.pow(1 + curInf / 100, 1 / 12);

        let isRealWealthOverride = false;
        let matchingPointId;
        if (params.wealthPoints.length > 0) {
          const matchingPoint = params.wealthPoints.find(p => p.year === year && p.month === month);
          if (matchingPoint) {
            const currentTotal = accountWealth + peaWealth + cashWealth;
            const diff = matchingPoint.value - currentTotal;
            accountWealth += diff;
            isRealWealthOverride = true;
            matchingPointId = matchingPoint.id;
            if (withDetails) explanations['wealth'] = `VALEUR RÉELLE IMPOSÉE : ${fmtE(matchingPoint.value)}\nPrécédent calculé : ${fmtE(currentTotal)}\nAjustement sur CT : ${fmtE(diff)}`;
          }
        }

        const accountYieldAmount = accountWealth * monthlyRate;
        const peaYieldAmount     = peaWealth * monthlyRate;

        let taxAmountAccount = 0;
        if (accountWealth > 0 && accountYieldAmount > 0) {
          const deductible = Math.min(accountYieldAmount, accumulatedTaxLosses);
          const taxable = accountYieldAmount - deductible;
          taxAmountAccount = taxable * taxRateTitresFactor;
          if (withDetails) explanations['netYieldCT'] = `Gain CT brut : ${fmtE(accountYieldAmount)}\nMV déduite : -${fmtE(deductible)} (stock ${fmtE(accumulatedTaxLosses)})\nImpôt PFU : ${fmtE(taxAmountAccount)}\nNet : ${fmtE(accountYieldAmount - taxAmountAccount)}`;
          accumulatedTaxLosses -= deductible;
        } else if (accountWealth > 0 && accountYieldAmount < 0) {
          accumulatedTaxLosses += Math.abs(accountYieldAmount);
          if (withDetails) explanations['netYieldCT'] = `Moins-value CT : ${fmtE(accountYieldAmount)}\nNouv. stock MV : ${fmtE(accumulatedTaxLosses)}`;
        }

        const netAccountYield = accountYieldAmount - taxAmountAccount;
        accountWealth += netAccountYield;
        peaWealth     += peaYieldAmount;

        customIncomes['Rendement CT (Net)']  = netAccountYield;
        customIncomes['Rendement PEA (Brut)'] = peaYieldAmount;

        let monthlyOtherNetIncome = 0;
        let incDetail = '';
        for (const item of params.otherIncomes) {
          if ((year > item.startYear || (year === item.startYear && month >= item.startMonth)) &&
              (year < item.endYear   || (year === item.endYear   && month <= item.endMonth))) {
            const yrs  = year - item.startYear;
            const brut = item.initialMonthlyAmount * Math.pow(1 + item.annualGrowthRate / 100, yrs);
            const net  = brut * (1 - (item.taxRate || 0) / 100);
            monthlyOtherNetIncome += net;
            customIncomes[item.label] = net;
            if (withDetails) incDetail += `${item.label} : ${fmtE(net)}\n`;
          }
        }
        if (withDetails) explanations['totalIncome'] = `REVENUS :\n${incDetail || 'Aucun\n'}+ CT : ${fmtE(netAccountYield)}\n+ PEA : ${fmtE(peaYieldAmount)}`;

        let monthlyExpenseSum = 0;
        const baseExp = baseExpensesMonthly * cumulativeInflationMult;
        monthlyExpenseSum += baseExp;
        customExpenses['Dépenses de Base'] = baseExp;

        let loanTotal = 0, loanDetail = '';
        for (const loan of params.loans) {
          const sv = loan.startYear * 12 + (loan.startMonth - 1);
          const ev = loan.endYear   * 12 + (loan.endMonth   - 1);
          const cv = year * 12 + (month - 1);
          if (cv >= sv && cv <= ev) {
            loanTotal += loan.monthlyPayment;
            customExpenses[loan.label] = (customExpenses[loan.label] || 0) + loan.monthlyPayment;
            if (withDetails) loanDetail += `${loan.label} : ${fmtE(loan.monthlyPayment)}\n`;
          }
        }
        monthlyExpenseSum += loanTotal;

        let otherExpDetail = '';
        for (const item of params.otherExpenses) {
          if ((year > item.startYear || (year === item.startYear && month >= item.startMonth)) &&
              (year < item.endYear   || (year === item.endYear   && month <= item.endMonth))) {
            const yrs = year - item.startYear;
            const val = item.initialMonthlyAmount * Math.pow(1 + item.annualGrowthRate / 100, yrs);
            monthlyExpenseSum += val;
            customExpenses[item.label] = val;
            if (withDetails) otherExpDetail += `${item.label} : ${fmtE(val)}\n`;
          }
        }
        if (withDetails) explanations['totalExpense'] = `DÉPENSES :\nBase : ${fmtE(baseExp)}\nEmprunts :\n${loanDetail||'Aucun\n'}${otherExpDetail}Total : ${fmtE(monthlyExpenseSum)}`;

        let taxAmountPEAWithdrawal = 0, currentPeaWithdrawalGross = 0;
        let flow = monthlyOtherNetIncome - monthlyExpenseSum;
        if (flow < 0) {
          let needed = -flow;
          if (accountWealth > 0) { const f = Math.min(accountWealth, needed); accountWealth -= f; needed -= f; }
          if (needed > 0 && peaWealth > 0) {
            const potNet = peaWealth * invTaxRatePEAFactor;
            const takenNet = Math.min(potNet, needed);
            const takenGross = takenNet / invTaxRatePEAFactor;
            peaWealth -= takenGross;
            currentPeaWithdrawalGross = takenGross;
            taxAmountPEAWithdrawal = takenGross * taxRatePEAFactor;
            needed -= takenNet;
          }
          if (needed > 0 && cashWealth > 0) { const f = Math.min(cashWealth, needed); cashWealth -= f; needed -= f; }
          if (needed > 0) accountWealth -= needed;
        } else {
          let surplus = flow;
          if (cashWealth < params.cashBuffer) {
            const toCash = Math.min(params.cashBuffer - cashWealth, surplus);
            cashWealth += toCash; surplus -= toCash;
          }
          accountWealth += surplus;
        }

        if (withDetails) {
          if (!isRealWealthOverride) explanations['wealth'] = `CT : ${fmtE(accountWealth)}\nPEA : ${fmtE(peaWealth)}\nCash : ${fmtE(cashWealth)}\nTOTAL : ${fmtE(accountWealth+peaWealth+cashWealth)}`;
          explanations['taxAmount'] = `CT : ${fmtE(taxAmountAccount)}\nPEA retrait : ${fmtE(taxAmountPEAWithdrawal)}\nStock MV : ${fmtE(accumulatedTaxLosses)}\nTotal : ${fmtE(taxAmountAccount+taxAmountPEAWithdrawal)}`;
        }

        results.push({
          monthIndex:m, date: withDetails ? new Date(year,month-1,1) : null,
          age, wealth: accountWealth+peaWealth+cashWealth,
          accountWealth, peaWealth, cashWealth,
          investedWealth: accountWealth+peaWealth, cash: cashWealth,
          yieldAmount: accountYieldAmount+peaYieldAmount,
          taxAmount: taxAmountAccount+taxAmountPEAWithdrawal,
          netYieldCT: netAccountYield, netYieldPEA: peaYieldAmount-taxAmountPEAWithdrawal,
          peaWithdrawal: currentPeaWithdrawalGross, taxLossBalance: accumulatedTaxLosses,
          rent:0, loans:loanTotal, education:0, baseExpenses:baseExp,
          customIncomes, customExpenses, donations:{},
          totalIncome: netAccountYield+peaYieldAmount+monthlyOtherNetIncome,
          totalExpense: monthlyExpenseSum,
          netCashflow: (netAccountYield+peaYieldAmount+monthlyOtherNetIncome)-monthlyExpenseSum,
          inflationRate: curInf, isNegativeYield: annualYield < 0,
          isRealWealthOverride, realWealthPointId: matchingPointId, explanations
        });
      }
      return results;
    }

    // ─── COMPOSANTS DE BASE ───────────────────────────────────────────────────────

    const Input = memo(({ label, value, onChange, suffix, type='number' }) => (
      <div className="flex flex-col gap-1">
        <label className="text-[9px] font-black uppercase text-slate-400 pl-1">{label}</label>
        <div className="relative">
          <input type={type} value={value} onChange={e => onChange(e.target.value)}
            className="w-full px-3 py-2 md:py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-xs font-bold outline-none focus:border-indigo-500 transition-colors" />
          {suffix && <span className="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] font-black text-slate-300">{suffix}</span>}
        </div>
      </div>
    ));

    const Select = memo(({ label, value, options, onChange }) => (
      <div className="flex flex-col gap-1">
        <label className="text-[9px] font-black uppercase text-slate-400 pl-1">{label}</label>
        <select value={value} onChange={e => onChange(e.target.value)}
          className="w-full px-2 py-2 md:py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-xs font-bold outline-none cursor-pointer focus:border-indigo-500 transition-colors">
          {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      </div>
    ));

    const KPICard = memo(({ label, value, color, icon }) => (
      <div className="bg-white p-3 md:p-6 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden group min-w-0">
        <div className="absolute top-0 left-0 w-1 h-full bg-slate-100 group-hover:bg-indigo-500 transition-colors"></div>
        <div className="absolute -top-4 -right-4 text-slate-100 opacity-20 hidden md:block">{React.cloneElement(icon, { size:80 })}</div>
        <p className="text-[9px] md:text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1 relative z-10 truncate">{label}</p>
        <p className={`text-base md:text-2xl font-black ${color} tracking-tight relative z-10 truncate`}>
          {new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(value)}
        </p>
      </div>
    ));

    const Section = memo(({ title, icon, children, headerAction, color }) => {
      const borderColor = color==='green' ? 'border-emerald-200' : color==='red' ? 'border-rose-200' : 'border-slate-200';
      const headerBg   = color==='green' ? 'bg-emerald-50/50' : color==='red' ? 'bg-rose-50/50' : 'bg-slate-50/50';
      return (
        <div className={`bg-white rounded-2xl shadow-sm border ${borderColor} overflow-hidden`}>
          <div className={`p-3 md:p-4 border-b ${borderColor} flex justify-between items-center ${headerBg}`}>
            <h3 className="font-bold flex items-center gap-2 uppercase text-[10px] md:text-xs">{icon} {title}</h3>
            {headerAction}
          </div>
          <div className="p-3 md:p-4">{children}</div>
        </div>
      );
    });

    const Tooltipable = memo(({ value, exp }) => {
      if (!exp) return <span>{value}</span>;
      return (
        <div className="group relative inline-block">
          <span className="cursor-help border-b border-dotted border-slate-400">{value}</span>
          <div className="pointer-events-none absolute bottom-full right-0 mb-3 w-[260px] md:w-[280px] p-3 bg-slate-900 text-slate-100 text-[10px] rounded-xl opacity-0 group-hover:opacity-100 transition-all z-[100] whitespace-pre-wrap leading-relaxed border border-slate-700 shadow-2xl">
            {exp}
          </div>
        </div>
      );
    });

    const TabButton = memo(({ active, onClick, icon, label }) => (
      <button onClick={onClick}
        className={`flex items-center gap-2 px-4 md:px-5 py-2.5 md:py-2 rounded-lg text-xs font-bold transition-all shrink-0 ${active ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-700'}`}>
        {icon} {label}
      </button>
    ));

    const ItemEditor = memo(({ it, type, onDel, onUpd }) => (
      <div className={`p-3 rounded-xl border ${type==='inc' ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'} flex flex-col gap-2 relative mb-2 shadow-sm`}>
        <div className="flex justify-between items-center gap-2">
          <input className="bg-transparent border-none text-xs font-bold p-0 focus:ring-0 outline-none w-full" value={it.label} onChange={e => onUpd({...it, label:e.target.value})} />
          <button onClick={onDel} className="text-slate-300 hover:text-rose-600 transition-colors shrink-0 p-1"><Trash2 className="w-4 h-4 md:w-3.5 md:h-3.5"/></button>
        </div>
        <div className="grid grid-cols-2 gap-2">
          <Input label="Mensuel" value={it.initialMonthlyAmount} onChange={v => onUpd({...it, initialMonthlyAmount:Number(v)})} />
          <Input label="Évol. %" value={it.annualGrowthRate}     onChange={v => onUpd({...it, annualGrowthRate:Number(v)})} />
          <div className="grid grid-cols-2 gap-1">
            <Select label="Mois Début" value={it.startMonth} options={MONTHS_LIST.map((m,i) => ({label:m,value:i+1}))} onChange={v => onUpd({...it, startMonth:Number(v)})} />
            <Input  label="Année Début" value={it.startYear}  onChange={v => onUpd({...it, startYear:Number(v)})} />
          </div>
          <div className="grid grid-cols-2 gap-1">
            <Select label="Mois Fin" value={it.endMonth} options={MONTHS_LIST.map((m,i) => ({label:m,value:i+1}))} onChange={v => onUpd({...it, endMonth:Number(v)})} />
            <Input  label="Année Fin" value={it.endYear}   onChange={v => onUpd({...it, endYear:Number(v)})} />
          </div>
        </div>
      </div>
    ));

    // ─── APP PRINCIPALE ───────────────────────────────────────────────────────────

    const App = () => {
      const [profiles, setProfiles] = useState(() => {
        const urlParams = new URLSearchParams(window.location.search);
        const shared = urlParams.get('snapshot');
        if (shared) {
          try {
            const decoded = JSON.parse(atob(decodeURIComponent(shared)));
            window.history.replaceState({}, document.title, window.location.pathname);
            return decoded;
          } catch(e) {}
        }
        const saved = localStorage.getItem(STORAGE_KEY_PROFILES);
        if (saved) { try { return JSON.parse(saved); } catch(e) {} }
        return [{ id:'default', name:'Profil Principal', params:DEFAULT_PARAMS }];
      });

      const [activeProfileId, setActiveProfileId] = useState(() =>
        localStorage.getItem(STORAGE_KEY_ACTIVE) || 'default'
      );
      const [activeTab, setActiveTab]       = useState('chart');
      const [tableMode, setTableMode]       = useState('annuel');
      const [draftPointMonth, setDraftPointMonth] = useState(new Date().getMonth()+1);
      const [draftPointYear,  setDraftPointYear]  = useState(new Date().getFullYear());
      const [draftPointValue, setDraftPointValue] = useState('');
      const [history, setHistory]           = useState([]);
      const [selectedRecordId, setSelectedRecordId] = useState('');

      const activeProfile = useMemo(() =>
        profiles.find(p => p.id === activeProfileId) || profiles[0],
        [profiles, activeProfileId]
      );
      const params = activeProfile.params;

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY_PROFILES, JSON.stringify(profiles));
        localStorage.setItem(STORAGE_KEY_ACTIVE, activeProfileId);
      }, [profiles, activeProfileId]);

      const saveHistory = useCallback(() => {
        setHistory(prev => [JSON.parse(JSON.stringify(profiles)), ...prev].slice(0, 30));
      }, [profiles]);

      const undo = useCallback(() => {
        if (history.length === 0) return;
        const [prev, ...rest] = history;
        setProfiles(prev); setHistory(rest);
      }, [history]);

      const updateParam = useCallback((key, value) => {
        saveHistory();
        setProfiles(prev => prev.map(p =>
          p.id === activeProfileId ? { ...p, params: { ...p.params, [key]: value } } : p
        ));
      }, [activeProfileId, saveHistory]);

      const handleShare = () => {
        try {
          const snapshot = btoa(JSON.stringify(profiles));
          const url = new URL(window.location.href);
          url.searchParams.set('snapshot', snapshot);
          navigator.clipboard.writeText(url.toString());
          alert('Lien de partage copié !');
        } catch(e) { alert('Erreur génération lien.'); }
      };

      const addWealthPoint = () => {
        if (draftPointValue === '') return;
        saveHistory();
        const newPoint = { id:Date.now().toString(), month:draftPointMonth, year:draftPointYear, value:draftPointValue };
        const existing = params.wealthPoints.findIndex(p => p.month===draftPointMonth && p.year===draftPointYear);
        let next = [...params.wealthPoints];
        if (existing > -1) next[existing] = newPoint; else next.push(newPoint);
        updateParam('wealthPoints', next);
        setDraftPointValue('');
      };

      const deleteWealthPoint = id => {
        saveHistory();
        updateParam('wealthPoints', params.wealthPoints.filter(p => p.id !== id));
      };

      const addProfile = () => {
        if (profiles.length >= 10) return;
        saveHistory();
        const newId = Date.now().toString();
        setProfiles([...profiles, { id:newId, name:`Profil ${profiles.length+1}`, params:DEFAULT_PARAMS }]);
        setActiveProfileId(newId);
      };

      const deleteProfile = (id, e) => {
        if (e) e.stopPropagation();
        if (profiles.length <= 1) return;
        if (window.confirm('Supprimer ce profil ?')) {
          saveHistory();
          const next = profiles.filter(p => p.id !== id);
          setProfiles(next);
          if (activeProfileId === id) setActiveProfileId(next[0].id);
        }
      };

      const projection = useMemo(() => calculateProjection(params, true), [params]);

      const yearlyProjection = useMemo(() => {
        const years = [];
        let curY = null;
        for (const m of projection) {
          const year = m.date.getFullYear();
          if (!curY || curY.year !== year) {
            if (curY) years.push(curY);
            curY = { year, age:m.age, wealthEnd:0, accountWealth:0, peaWealth:0, cashWealth:0,
              totalYield:0, totalTax:0, totalIncome:0, totalExpense:0, netCashflow:0,
              netYieldCT:0, netYieldPEA:0, peaWithdrawal:0, baseExpenses:0, rent:0, loans:0, education:0,
              customIncomes:{}, customExpenses:{}, taxLossBalance:0, hasRealWealthPoint:false };
          }
          curY.wealthEnd      = m.wealth;
          curY.accountWealth  = m.accountWealth;
          curY.peaWealth      = m.peaWealth;
          curY.cashWealth     = m.cashWealth;
          curY.totalYield    += m.yieldAmount;
          curY.totalTax      += m.taxAmount;
          curY.totalIncome   += m.totalIncome;
          curY.totalExpense  += m.totalExpense;
          curY.netCashflow   += m.netCashflow;
          curY.netYieldCT    += m.netYieldCT;
          curY.netYieldPEA   += m.netYieldPEA;
          curY.peaWithdrawal += m.peaWithdrawal;
          curY.baseExpenses  += m.baseExpenses;
          curY.loans         += m.loans;
          curY.taxLossBalance = m.taxLossBalance;
          Object.entries(m.customIncomes).forEach(([k,v]) => { curY.customIncomes[k] = (curY.customIncomes[k]||0)+v; });
          Object.entries(m.customExpenses).forEach(([k,v]) => { curY.customExpenses[k] = (curY.customExpenses[k]||0)+v; });
          if (m.isRealWealthOverride) curY.hasRealWealthPoint = true;
        }
        if (curY) years.push(curY);
        return years;
      }, [projection]);

      const yearlyChartData = useMemo(() => yearlyProjection.map(y => {
        const incomes  = {...y.customIncomes};
        const expenses = {...y.customExpenses};
        return { year:y.year, ...incomes, ...Object.keys(expenses).reduce((a,k) => ({...a,[`exp_${k}`]:expenses[k]}),{}) };
      }), [yearlyProjection]);

      const incomeLabels = useMemo(() => {
        const s = new Set(); projection.forEach(m => Object.keys(m.customIncomes).forEach(l => s.add(l))); return [...s];
      }, [projection]);
      const expenseLabels = useMemo(() => {
        const s = new Set(); projection.forEach(m => Object.keys(m.customExpenses).forEach(l => s.add(l))); return [...s];
      }, [projection]);

      const kpis = useMemo(() => {
        if (!projection.length) return { at70:0, final:0, min:0 };
        return {
          at70:  projection.find(p => p.age === 70)?.wealth ?? 0,
          final: projection[projection.length-1].wealth,
          min:   Math.min(...projection.map(p => p.wealth))
        };
      }, [projection]);

      const targetMilestones = useMemo(() => {
        let low = 0, high = 2e8;
        for (let i = 0; i < 25; i++) {
          const mid = (low+high)/2;
          const res = calculateProjection({...params, initialWealth:mid}, false);
          (res[res.length-1]?.wealth ?? 0) > 0 ? (high=mid) : (low=mid);
        }
        const ideal = (low+high)/2;
        const r = calculateProjection({...params, initialWealth:ideal}, false);
        const now = new Date();
        const idxCurrent = (now.getFullYear()-2026)*12+(now.getMonth());
        return {
          y2026: r[0]?.wealth || 0,
          y2048: r[(2048-2026)*12]?.wealth || 0,
          current: (idxCurrent>=0 && idxCurrent<r.length) ? r[idxCurrent].wealth : 0
        };
      }, [params]);

      const currentMonthLabel = useMemo(() => `${MONTHS_LIST[new Date().getMonth()]} ${new Date().getFullYear()}`, []);

      const formatEuro = val =>
        new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(val);

      const sortedRecords = useMemo(() =>
        [...(params.distributionRecords||[])].sort((a,b) =>
          (a.year*10000+a.month*100+a.day)-(b.year*10000+b.month*100+b.day)
        ), [params.distributionRecords]);

      const activeRecordIndex = useMemo(() => {
        if (!selectedRecordId) return sortedRecords.length-1;
        const f = sortedRecords.findIndex(r => r.id===selectedRecordId);
        return f===-1 ? sortedRecords.length-1 : f;
      }, [selectedRecordId, sortedRecords]);

      const displayedRecords = useMemo(() => {
        if (!sortedRecords.length) return [];
        const idx = activeRecordIndex;
        return sortedRecords.slice(Math.max(0,idx-2), idx+1);
      }, [sortedRecords, activeRecordIndex]);

      const activePlacementsIds = useMemo(() => new Set(params.placements.map(p => p.id)), [params.placements]);

      const addPlacement = () => {
        saveHistory();
        updateParam('placements', [...params.placements, { id:'p-'+Date.now(), bank:'Nouvelle Banque', accountType:'Compte', supportType:'Actions' }]);
      };

      const deletePlacement = id => {
        saveHistory();
        const nextPl = params.placements.filter(p => p.id!==id);
        const nextRe = params.distributionRecords.map(r => {
          const v={...r.values}, mod={...r.modified}; delete v[id]; delete mod[id];
          return {...r, values:v, modified:mod};
        });
        setProfiles(prev => prev.map(p =>
          p.id===activeProfileId ? {...p, params:{...p.params, placements:nextPl, distributionRecords:nextRe}} : p
        ));
      };

      const addDistributionDate = () => {
        saveHistory();
        const last = sortedRecords[sortedRecords.length-1];
        let nDay=last?last.day:1, nMonth=last?last.month+1:2, nYear=last?last.year:2026;
        if (nMonth>12) { nMonth=1; nYear++; }
        const newRec = { id:'dr-'+Date.now(), day:nDay, month:nMonth, year:nYear, values:last?{...last.values}:{}, modified:{} };
        updateParam('distributionRecords', [...params.distributionRecords, newRec]);
        setSelectedRecordId(newRec.id);
      };

      const updateDistributionValue = useCallback((recordId, placementId, val) => {
        saveHistory();
        updateParam('distributionRecords', params.distributionRecords.map(r =>
          r.id!==recordId ? r : {...r, values:{...r.values,[placementId]:val}, modified:{...r.modified,[placementId]:true}}
        ));
      }, [params.distributionRecords, updateParam, saveHistory]);

      const updateRecordDate = useCallback((recordId, field, val) => {
        saveHistory();
        updateParam('distributionRecords', params.distributionRecords.map(r =>
          r.id!==recordId ? r : {...r, [field]:val}
        ));
      }, [params.distributionRecords, updateParam, saveHistory]);

      const updatePlacementInfo = useCallback((placementId, field, val) => {
        saveHistory();
        updateParam('placements', params.placements.map(p => p.id===placementId ? {...p,[field]:val} : p));
      }, [params.placements, updateParam, saveHistory]);

      const colors = ["#6366f1","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899","#06b6d4","#f97316","#14b8a6","#3b82f6"];

      const CustomizedXAxisTick = ({ x, y, payload }) => {
        const item = yearlyProjection.find(d => d.year===payload.value);
        if (!item) return null;
        return (
          <g transform={`translate(${x},${y})`}>
            <text x={0} y={0} dy={14} textAnchor="middle" fill="#64748b" fontSize={10} fontWeight={700}>{item.year}</text>
            <text x={0} y={0} dy={26} textAnchor="middle" fill="#6366f1" fontSize={9} fontWeight={800} opacity={0.6}>{item.age} ans</text>
          </g>
        );
      };

      const AddBtn = ({ onClick, label }) => (
        <button onClick={onClick} className="px-2 py-1.5 md:py-1 bg-indigo-50 text-indigo-600 rounded text-[9px] font-black uppercase hover:bg-indigo-100 flex items-center gap-1 shrink-0">
          <Plus className="w-2.5 h-2.5"/> {label}
        </button>
      );

      return (
        <div className="min-h-screen flex flex-col bg-slate-50 font-sans text-slate-900 text-sm overflow-x-hidden">
          {/* HEADER */}
          <header className="bg-slate-900 text-white p-3 md:p-4 shadow-xl sticky top-0 z-50 border-b border-slate-700">
            <div className="max-w-[1600px] mx-auto flex flex-col lg:flex-row justify-between items-center gap-4 lg:gap-6">
              <div className="flex items-center gap-3 md:gap-4 w-full lg:w-auto">
                <div className="bg-gradient-to-tr from-indigo-500 to-indigo-400 p-2 md:p-2.5 rounded-full shadow-[0_0_15px_rgba(99,102,241,0.4)] border border-indigo-400/50 flex items-center justify-center w-10 h-10 md:w-12 md:h-12 shrink-0">
                  <Euro className="w-6 h-6 md:w-8 md:h-8 text-white drop-shadow-[0_2px_3px_rgba(0,0,0,0.4)]" />
                </div>
                <div className="overflow-hidden">
                  <h1 className="text-lg md:text-xl font-black tracking-tight uppercase whitespace-nowrap flex items-center gap-1.5">
                    Die With <Heart className="w-5 h-5 md:w-6 md:h-6 text-rose-400 fill-rose-400 mb-1" /> regret
                  </h1>
                  <p className="text-[9px] md:text-[10px] text-slate-400 font-bold uppercase tracking-widest truncate">Optimise ta Life</p>
                </div>
              </div>

              <div className="flex flex-col md:flex-row items-center gap-3 md:gap-4 w-full lg:w-auto">
                <div className="flex items-center bg-slate-800/80 rounded-xl p-1 gap-1 border border-slate-700 w-full md:w-auto overflow-x-auto no-scrollbar">
                  <div className="px-2 md:px-3 flex items-center gap-2 text-[9px] font-black uppercase text-slate-500 border-r border-slate-700 mr-1 shrink-0 sticky left-0 bg-slate-800 z-10">SCENARIOS</div>
                  {profiles.map(p => (
                    <div key={p.id} className="relative group/tab shrink-0">
                      <button onClick={() => setActiveProfileId(p.id)}
                        className={`px-2.5 md:px-3 py-1.5 pr-6 rounded-lg text-[9px] md:text-[10px] font-bold transition-all whitespace-nowrap ${activeProfileId===p.id ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-700'}`}>
                        {p.name.substring(0,12)}
                      </button>
                      {profiles.length>1 && (
                        <button onClick={e => deleteProfile(p.id,e)} className="absolute right-1 top-1/2 -translate-y-1/2 p-0.5 rounded-full hover:bg-white/20 transition-all opacity-0 group-hover/tab:opacity-100 text-slate-500">
                          <X className="w-2.5 h-2.5"/>
                        </button>
                      )}
                    </div>
                  ))}
                  <button onClick={addProfile} className="p-1.5 rounded-lg text-emerald-400 hover:bg-emerald-500/10 shrink-0"><Plus className="w-4 h-4"/></button>
                </div>

                <nav className="flex bg-slate-800/50 backdrop-blur-sm rounded-xl p-1 border border-slate-700 w-full md:w-auto overflow-x-auto no-scrollbar">
                  <TabButton active={activeTab==='chart'}        onClick={() => setActiveTab('chart')}        icon={<TrendingUp className="w-4 h-4"/>} label="Graphiques" />
                  <TabButton active={activeTab==='table'}        onClick={() => setActiveTab('table')}        icon={<TableIcon className="w-4 h-4"/>}   label="Tableau" />
                  <TabButton active={activeTab==='distribution'} onClick={() => setActiveTab('distribution')} icon={<Layers className="w-4 h-4"/>}      label="Répartition" />
                  <TabButton active={activeTab==='settings'}     onClick={() => setActiveTab('settings')}     icon={<Settings className="w-4 h-4"/>}    label="Hypothèses" />
                </nav>
              </div>
            </div>
          </header>

          {/* WEALTH POINT BAR */}
          <div className="bg-white border-b border-slate-200 py-2 md:py-3 shadow-sm sticky top-[72px] z-40">
            <div className="max-w-[1600px] mx-auto px-4 flex items-center justify-between gap-3 md:gap-4">
              <div className="flex items-center gap-3 md:gap-4 bg-indigo-50/70 p-1.5 md:px-5 md:py-2 rounded-2xl border border-indigo-100 w-full lg:w-auto overflow-x-auto no-scrollbar">
                <div className="p-1.5 bg-indigo-600 rounded-lg text-white shrink-0 sticky left-0 z-10 shadow-sm"><MapPin className="w-3.5 h-3.5"/></div>
                <div className="flex items-center gap-3 shrink-0 pr-4">
                  <span className="text-[10px] md:text-[11px] font-black uppercase text-indigo-900 tracking-tight whitespace-nowrap hidden sm:inline">Passage :</span>
                  <div className="flex items-center gap-2">
                    <select className="bg-white border border-indigo-200 rounded-lg text-xs font-bold px-1.5 py-1.5 md:py-1 shadow-sm"
                      value={draftPointMonth} onChange={e => setDraftPointMonth(Number(e.target.value))}>
                      {MONTHS_LIST.map((m,i) => <option key={i+1} value={i+1}>{m}</option>)}
                    </select>
                    <input type="number" className="w-16 md:w-20 bg-white border border-indigo-200 rounded-lg text-xs font-bold px-1.5 py-1.5 md:py-1 shadow-sm"
                      value={draftPointYear} onChange={e => setDraftPointYear(Number(e.target.value))} />
                    <div className="relative">
                      <input type="number" placeholder="Réel..." className="w-28 md:w-44 bg-white border border-indigo-200 rounded-lg text-xs font-bold pl-2 pr-6 py-1.5 md:py-1 shadow-sm"
                        value={draftPointValue} onChange={e => setDraftPointValue(e.target.value===''?'':Number(e.target.value))} />
                      <span className="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] font-black text-slate-400">€</span>
                    </div>
                    <button onClick={addWealthPoint} disabled={draftPointValue===''}
                      className={`p-1.5 md:p-2 rounded-lg transition-all shrink-0 ${draftPointValue==='' ? 'bg-slate-100 text-slate-300' : 'bg-indigo-600 text-white shadow-md'}`}>
                      <Check className="w-4 h-4"/>
                    </button>
                  </div>
                </div>
                {params.wealthPoints.length > 0 && (
                  <div className="flex items-center gap-1.5 border-l border-indigo-200 pl-4 py-1 shrink-0">
                    {params.wealthPoints.slice(-2).map(p => (
                      <div key={p.id} className="flex items-center gap-1.5 bg-white border border-indigo-100 px-2 py-1 rounded-md text-[9px] font-black text-indigo-600 whitespace-nowrap shadow-sm">
                        {MONTHS_LIST[p.month-1]}/{p.year}
                        <button onClick={() => deleteWealthPoint(p.id)} className="text-rose-400 hover:text-rose-600 p-0.5"><Trash2 className="w-2.5 h-2.5"/></button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <button onClick={handleShare} className="hidden sm:flex p-2.5 bg-indigo-50 text-indigo-600 rounded-xl border border-indigo-100 shadow-sm hover:bg-indigo-100 transition-colors"><Share2 className="w-4 h-4"/></button>
            </div>
          </div>

          {/* MAIN */}
          <main className="flex-grow p-4 md:p-8 max-w-[1600px] mx-auto w-full">
            {/* KPIs */}
            <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 md:gap-6 mb-8">
              <KPICard label="Patrimoine à 70 ans"                      value={kpis.at70}                 color="text-indigo-600" icon={<Calendar className="w-5 h-5 opacity-20"/>} />
              <KPICard label="Patrimoine Final"                          value={kpis.final}                color="text-emerald-600" icon={<TrendingUp className="w-5 h-5 opacity-20"/>} />
              <KPICard label="Patrimoine Minimal"                        value={kpis.min}                  color="text-rose-600"   icon={<ArrowDownRight className="w-5 h-5 opacity-20"/>} />
              <KPICard label="Cible patrimoine initial (fin à 0)"        value={targetMilestones.y2026}    color="text-sky-600"    icon={<Clock className="w-5 h-5 opacity-20"/>} />
              <KPICard label="Cible Janv 2048"                           value={targetMilestones.y2048}    color="text-amber-600"  icon={<Check className="w-5 h-5 opacity-20"/>} />
              <KPICard label={`Cible ${currentMonthLabel}`}              value={targetMilestones.current}  color="text-sky-600"    icon={<Clock className="w-5 h-5 opacity-20"/>} />
            </div>

            {/* ─── GRAPHIQUES ─── */}
            {activeTab==='chart' && (
              <div className="space-y-8">
                <div className="bg-white rounded-3xl shadow-sm p-4 md:p-8 border border-slate-200 overflow-hidden">
                  <h2 className="text-lg font-black uppercase tracking-tight text-slate-800 mb-6 flex items-center gap-3">
                    <div className="p-2 bg-indigo-100 text-indigo-600 rounded-xl"><TrendingUp className="w-5 h-5"/></div> Évolution Globale
                  </h2>
                  <div className="h-[250px] md:h-[450px] w-full">
                    <ResponsiveContainer width="100%" height="100%">
                      <AreaChart data={projection.filter((_,i) => i%12===0)}>
                        <defs><linearGradient id="colorW" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#6366f1" stopOpacity={0.15}/><stop offset="95%" stopColor="#6366f1" stopOpacity={0}/></linearGradient></defs>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
                        <XAxis dataKey="age" stroke="#94a3b8" height={60} tick={<CustomizedXAxisTick/>}/>
                        <YAxis tickFormatter={v => `${(v/1000).toFixed(0)}k€`} stroke="#94a3b8" tick={{fontSize:10}}/>
                        <Tooltip formatter={v => formatEuro(v)}/>
                        <Area type="monotone" dataKey="wealth" stroke="#6366f1" strokeWidth={3} fill="url(#colorW)"/>
                      </AreaChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
                  <div className="bg-white rounded-3xl shadow-sm p-4 md:p-8 border border-slate-200 overflow-hidden">
                    <h2 className="text-lg font-black uppercase tracking-tight text-slate-800 mb-6 flex items-center gap-3">
                      <div className="p-2 bg-emerald-100 text-emerald-600 rounded-xl"><PlusCircle className="w-5 h-5"/></div> Composition des Recettes
                    </h2>
                    <div className="h-[300px] md:h-[400px] w-full">
                      <ResponsiveContainer width="100%" height="100%">
                        <BarChart data={yearlyChartData}>
                          <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
                          <XAxis dataKey="year" stroke="#94a3b8" tick={{fontSize:10}}/>
                          <YAxis tickFormatter={v => `${(v/1000).toFixed(0)}k€`} stroke="#94a3b8" tick={{fontSize:10}}/>
                          <Tooltip formatter={v => formatEuro(v)}/>
                          <Legend wrapperStyle={{fontSize:'10px',paddingTop:'10px'}}/>
                          {incomeLabels.map((label,idx) => <Bar key={label} dataKey={label} stackId="a" fill={colors[idx%colors.length]}/>)}
                        </BarChart>
                      </ResponsiveContainer>
                    </div>
                  </div>

                  <div className="bg-white rounded-3xl shadow-sm p-4 md:p-8 border border-slate-200 overflow-hidden">
                    <h2 className="text-lg font-black uppercase tracking-tight text-slate-800 mb-6 flex items-center gap-3">
                      <div className="p-2 bg-rose-100 text-rose-600 rounded-xl"><MinusCircle className="w-5 h-5"/></div> Composition des Dépenses
                    </h2>
                    <div className="h-[300px] md:h-[400px] w-full">
                      <ResponsiveContainer width="100%" height="100%">
                        <BarChart data={yearlyChartData}>
                          <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
                          <XAxis dataKey="year" stroke="#94a3b8" tick={{fontSize:10}}/>
                          <YAxis tickFormatter={v => `${(v/1000).toFixed(0)}k€`} stroke="#94a3b8" tick={{fontSize:10}}/>
                          <Tooltip formatter={v => formatEuro(v)}/>
                          <Legend wrapperStyle={{fontSize:'10px',paddingTop:'10px'}}/>
                          {expenseLabels.map((label,idx) => <Bar key={label} dataKey={`exp_${label}`} stackId="a" fill={colors[idx%colors.length]} name={label}/>)}
                        </BarChart>
                      </ResponsiveContainer>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ─── TABLEAU ─── */}
            {activeTab==='table' && (
              <div className="bg-white rounded-3xl shadow-sm overflow-hidden border border-slate-200 flex flex-col">
                <div className="p-3 md:p-4 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-center bg-slate-50 gap-3">
                  <div className="flex gap-2 p-1 bg-slate-200 rounded-xl w-full sm:w-auto">
                    <button onClick={() => setTableMode('annuel')} className={`flex-1 px-4 py-2 md:py-1.5 rounded-lg text-xs font-bold transition-all ${tableMode==='annuel' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>Annuel</button>
                    <button onClick={() => setTableMode('mensuel')} className={`flex-1 px-4 py-2 md:py-1.5 rounded-lg text-xs font-bold transition-all ${tableMode==='mensuel' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>Mensuel</button>
                  </div>
                  <span className="text-[9px] md:text-[10px] font-black uppercase text-slate-400 tracking-widest bg-slate-100 px-3 py-1.5 md:py-1 rounded-full border border-slate-200 flex items-center gap-2">
                    <Info className="w-3 h-3"/> Survol pour le détail
                  </span>
                </div>
                <div className="overflow-x-auto no-scrollbar relative">
                  <table className="w-full text-left border-collapse min-w-[1200px] lg:min-w-[1600px]">
                    <thead className="sticky top-0 bg-white z-20 shadow-sm border-b border-slate-200">
                      <tr className="text-[10px] uppercase tracking-wider text-slate-400 font-black bg-slate-50">
                        <th className="p-3 md:p-4 sticky left-0 bg-slate-50 border-r border-slate-100 min-w-[100px] md:min-w-[120px]">Période</th>
                        <th className="p-3 md:p-4 text-right">Total</th>
                        <th className="p-3 md:p-4 text-right">C. Titre</th>
                        <th className="p-3 md:p-4 text-right">PEA</th>
                        <th className="p-3 md:p-4 text-right">Cash</th>
                        <th className="p-3 md:p-4 text-right text-emerald-700">Revenus (+)</th>
                        <th className="p-3 md:p-4 text-right text-rose-700">Dépenses (-)</th>
                        <th className="p-3 md:p-4 text-right text-indigo-600">Rend. CT</th>
                        <th className="p-3 md:p-4 text-right text-indigo-600">Rend. PEA</th>
                        <th className="p-3 md:p-4 text-right text-slate-500">Impôt</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100 text-[10px] md:text-[11px] font-medium">
                      {(tableMode==='mensuel' ? projection : yearlyProjection).map((row, idx) => {
                        const isM = 'monthIndex' in row;
                        const w   = isM ? row.wealth : row.wealthEnd;
                        const ex  = row.explanations || {};
                        return (
                          <tr key={idx} className="hover:bg-indigo-50/50 transition-colors">
                            <td className="p-3 md:p-4 sticky left-0 z-10 border-r border-slate-100 font-bold bg-white">
                              {isM ? `${MONTHS_LIST[row.date.getMonth()]} ${row.date.getFullYear()}` : row.year} ({row.age}a)
                            </td>
                            <td className="p-3 md:p-4 text-right font-black"><Tooltipable value={formatEuro(w)} exp={ex.wealth}/></td>
                            <td className="p-3 md:p-4 text-right text-slate-600">{formatEuro(row.accountWealth)}</td>
                            <td className="p-3 md:p-4 text-right text-slate-600">{formatEuro(row.peaWealth)}</td>
                            <td className="p-3 md:p-4 text-right text-slate-600">{formatEuro(row.cashWealth)}</td>
                            <td className="p-3 md:p-4 text-right text-emerald-600 font-black"><Tooltipable value={formatEuro(row.totalIncome)} exp={ex.totalIncome}/></td>
                            <td className="p-3 md:p-4 text-right text-rose-600 font-black"><Tooltipable value={`-${formatEuro(row.totalExpense)}`} exp={ex.totalExpense}/></td>
                            <td className="p-3 md:p-4 text-right text-indigo-600"><Tooltipable value={formatEuro(row.netYieldCT)} exp={ex.netYieldCT}/></td>
                            <td className="p-3 md:p-4 text-right text-indigo-600">{formatEuro(row.netYieldPEA)}</td>
                            <td className="p-3 md:p-4 text-right opacity-60"><Tooltipable value={formatEuro(row.taxAmount)} exp={ex.taxAmount}/></td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* ─── RÉPARTITION ─── */}
            {activeTab==='distribution' && (
              <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                <div className="p-4 md:p-6 border-b border-slate-100 bg-slate-50 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 md:gap-6">
                  <div className="flex flex-col gap-2">
                    <h2 className="text-lg font-black uppercase tracking-tight text-slate-800 flex items-center gap-3">
                      <div className="p-2 bg-indigo-100 text-indigo-600 rounded-xl"><Layers className="w-4 h-4"/></div> Répartition
                    </h2>
                    <p className="text-[9px] md:text-[10px] text-slate-400 font-bold uppercase tracking-widest hidden sm:block">Détail par support de placement</p>
                  </div>
                  <div className="flex flex-wrap items-center gap-2 md:gap-3 w-full lg:w-auto">
                    {history.length > 0 && (
                      <button onClick={undo} className="px-3 py-2 bg-amber-50 text-amber-600 border border-amber-200 rounded-xl text-[9px] md:text-[10px] font-black uppercase shadow-sm flex items-center gap-2 hover:bg-amber-100 transition-all">
                        <Undo2 className="w-3.5 h-3.5"/> Retour
                      </button>
                    )}
                    <div className="flex items-center gap-2 bg-white border border-slate-200 p-1.5 rounded-xl shadow-sm flex-1 md:flex-none">
                      <Calendar className="w-4 h-4 text-slate-400 ml-1 shrink-0"/>
                      <select className="bg-transparent text-xs font-black outline-none border-none pr-6 w-full"
                        value={selectedRecordId || (sortedRecords[sortedRecords.length-1]?.id || '')}
                        onChange={e => setSelectedRecordId(e.target.value)}>
                        {sortedRecords.map(r => (
                          <option key={r.id} value={r.id}>{r.day<10?'0'+r.day:r.day}/{r.month<10?'0'+r.month:r.month}/{r.year}</option>
                        ))}
                      </select>
                    </div>
                    <button onClick={addDistributionDate} className="px-4 py-2.5 bg-indigo-600 text-white rounded-xl text-[10px] md:text-xs font-black uppercase shadow-md flex items-center justify-center gap-2 hover:bg-indigo-700 transition-all flex-1 md:flex-none">
                      <Plus className="w-4 h-4"/> Nouvelle Date
                    </button>
                    <button onClick={addPlacement} className="px-4 py-2.5 bg-white border border-slate-200 text-slate-600 rounded-xl text-[10px] md:text-xs font-black uppercase shadow-sm flex items-center justify-center gap-2 hover:bg-slate-50 transition-all flex-1 md:flex-none">
                      <PlusCircle className="w-4 h-4"/> Nouveau Support
                    </button>
                  </div>
                </div>

                <div className="overflow-x-auto no-scrollbar relative">
                  <table className="w-full text-left border-collapse min-w-[700px] md:min-w-[1000px]">
                    <thead>
                      <tr className="bg-slate-50/50 text-[10px] uppercase font-black text-slate-400 border-b border-slate-100">
                        <th className="p-3 md:p-4 border-r border-slate-100 min-w-[120px] md:min-w-[200px]">Banque</th>
                        <th className="p-3 md:p-4 border-r border-slate-100 min-w-[90px] md:min-w-[100px]">Type Compte</th>
                        <th className="p-3 md:p-4 border-r border-slate-100 min-w-[90px] md:min-w-[100px]">Support</th>
                        {displayedRecords.map(r => (
                          <th key={r.id} className="p-3 md:p-4 text-center bg-indigo-50/30 text-indigo-900 border-r border-slate-100 min-w-[110px] md:min-w-[150px]">
                            <div className="flex flex-col gap-1 items-center">
                              <div className="flex gap-1">
                                <input type="number" className="w-8 bg-white border border-indigo-200 rounded px-1 py-0.5 text-[8px] md:text-[9px] text-center"
                                  value={r.day} onChange={e => updateRecordDate(r.id,'day',Number(e.target.value))}/>
                                <select className="bg-white border border-indigo-200 rounded px-1 py-0.5 text-[8px] md:text-[9px]"
                                  value={r.month} onChange={e => updateRecordDate(r.id,'month',Number(e.target.value))}>
                                  {MONTHS_LIST.map((m,i) => <option key={i+1} value={i+1}>{m}</option>)}
                                </select>
                                <input type="number" className="w-12 bg-white border border-indigo-200 rounded px-1 py-0.5 text-[8px] md:text-[9px] text-center"
                                  value={r.year} onChange={e => updateRecordDate(r.id,'year',Number(e.target.value))}/>
                              </div>
                            </div>
                          </th>
                        ))}
                        <th className="p-2 w-8 md:w-10"></th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {params.placements.map(p => (
                        <tr key={p.id} className="hover:bg-slate-50 transition-colors group">
                          <td className="p-2.5 md:p-3 border-r border-slate-100">
                            <input className="bg-transparent border-none w-full text-[10px] md:text-xs font-bold focus:ring-0 outline-none p-1"
                              value={p.bank} onChange={e => updatePlacementInfo(p.id,'bank',e.target.value)}/>
                          </td>
                          <td className="p-2.5 md:p-3 border-r border-slate-100">
                            <input className="bg-transparent border-none w-full text-[10px] md:text-xs font-medium focus:ring-0 outline-none p-1 text-slate-600"
                              value={p.accountType} onChange={e => updatePlacementInfo(p.id,'accountType',e.target.value)}/>
                          </td>
                          <td className="p-2.5 md:p-3 border-r border-slate-100">
                            <select className="bg-transparent border-none w-full text-[10px] md:text-xs font-medium focus:ring-0 outline-none p-1 text-slate-500 italic cursor-pointer"
                              value={p.supportType} onChange={e => updatePlacementInfo(p.id,'supportType',e.target.value)}>
                              <option value="cash">cash</option>
                              <option value="actions">actions</option>
                              <option value="pseudo cash">pseudo cash</option>
                              {!['cash','actions','pseudo cash'].includes(p.supportType) && <option value={p.supportType}>{p.supportType}</option>}
                            </select>
                          </td>
                          {displayedRecords.map(r => {
                            const val = r.values[p.id] || 0;
                            const isMod = r.modified[p.id]===true;
                            return (
                              <td key={r.id} className="p-2.5 md:p-3 text-right border-r border-slate-100 font-black relative">
                                <input type="number"
                                  className={`bg-transparent border-none w-full text-right text-[10px] md:text-xs focus:ring-0 outline-none p-1 ${isMod ? 'text-slate-900' : 'text-rose-500 font-bold'}`}
                                  value={val} onChange={e => updateDistributionValue(r.id,p.id,Number(e.target.value))}/>
                              </td>
                            );
                          })}
                          <td className="p-2 md:p-3 text-center opacity-40 md:opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onClick={() => deletePlacement(p.id)} className="text-rose-300 hover:text-rose-600 p-1"><Trash2 className="w-4 h-4"/></button>
                          </td>
                        </tr>
                      ))}
                      <tr className="bg-slate-900 text-white font-black text-[10px] md:text-xs">
                        <td colSpan={3} className="p-3 md:p-4 uppercase tracking-widest text-[9px] md:text-[10px]">Total</td>
                        {displayedRecords.map(r => {
                          const total = Object.entries(r.values)
                            .filter(([pid]) => activePlacementsIds.has(pid))
                            .reduce((sum,[_,v]) => sum+v, 0);
                          return <td key={r.id} className="p-3 md:p-4 text-right border-r border-slate-700">{formatEuro(total)}</td>;
                        })}
                        <td></td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* ─── HYPOTHÈSES ─── */}
            {activeTab==='settings' && (
              <div className="grid grid-cols-1 xl:grid-cols-12 gap-6 md:gap-8">
                <div className="xl:col-span-4 space-y-6">
                  <Section title="Paramètres initiaux" icon={<Euro className="w-5 h-5"/>} color="green">
                    <div className="grid grid-cols-2 gap-3 md:gap-4">
                      <Input label="Patrimoine Initial" value={params.initialWealth}    onChange={v => updateParam('initialWealth',Number(v))}    suffix="€"/>
                      <Input label="PEA"                value={params.initialPEAWealth} onChange={v => updateParam('initialPEAWealth',Number(v))} suffix="€"/>
                      <Input label="Âge actuel"         value={params.currentAge}       onChange={v => updateParam('currentAge',Number(v))}/>
                      <Input label="Cash tampon"        value={params.cashBuffer}       onChange={v => updateParam('cashBuffer',Number(v))}        suffix="€"/>
                      <div className="col-span-2">
                        <Input label="Stock MV initial" value={params.initialTaxLosses} onChange={v => updateParam('initialTaxLosses',Number(v))} suffix="€"/>
                      </div>
                    </div>
                  </Section>

                  <Section title="Rendements" icon={<Percent className="w-5 h-5"/>} color="green">
                    <div className="grid grid-cols-2 sm:grid-cols-5 gap-2 mb-4">
                      {Object.keys(params.yieldsByYear).map(y => (
                        <Input key={y} label={y} value={params.yieldsByYear[Number(y)]}
                          onChange={v => updateParam('yieldsByYear',{...params.yieldsByYear,[Number(y)]:Number(v)})}/>
                      ))}
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
                      <Input label="2036-2045" value={params.yield2036_2045}  onChange={v => updateParam('yield2036_2045',Number(v))}/>
                      <Input label="2046-2060" value={params.yield2045_2060}  onChange={v => updateParam('yield2045_2060',Number(v))}/>
                      <Input label="2061+"     value={params.yield2060_2078}  onChange={v => updateParam('yield2060_2078',Number(v))}/>
                    </div>
                  </Section>
                </div>

                <div className="xl:col-span-4 space-y-6">
                  <Section title="Emprunts" icon={<Clock className="w-5 h-5"/>} color="red" headerAction={
                    <AddBtn onClick={() => updateParam('loans',[...params.loans,{id:Date.now().toString(),label:'Nouvel Emprunt',startMonth:1,startYear:2026,endMonth:12,endYear:2030,monthlyPayment:500}])} label="+ Emprunt"/>
                  }>
                    <div className="space-y-3">
                      {params.loans.map(loan => (
                        <div key={loan.id} className="p-3 border border-indigo-100 bg-indigo-50/20 rounded-xl relative shadow-sm">
                          <button onClick={() => updateParam('loans',params.loans.filter(l => l.id!==loan.id))} className="absolute top-2 right-2 text-indigo-300 hover:text-rose-600 p-1"><Trash2 className="w-4 h-4 md:w-3.5 md:h-3.5"/></button>
                          <Input label="Label" type="text" value={loan.label} onChange={v => updateParam('loans',params.loans.map(l => l.id===loan.id?{...l,label:v}:l))}/>
                          <div className="grid grid-cols-2 gap-2 mt-2">
                            <Select label="Mois Début" value={loan.startMonth} options={MONTHS_LIST.map((m,i) => ({label:m,value:i+1}))} onChange={v => updateParam('loans',params.loans.map(l => l.id===loan.id?{...l,startMonth:Number(v)}:l))}/>
                            <Input  label="Année Début" value={loan.startYear}  onChange={v => updateParam('loans',params.loans.map(l => l.id===loan.id?{...l,startYear:Number(v)}:l))}/>
                            <Select label="Mois Fin"   value={loan.endMonth}   options={MONTHS_LIST.map((m,i) => ({label:m,value:i+1}))} onChange={v => updateParam('loans',params.loans.map(l => l.id===loan.id?{...l,endMonth:Number(v)}:l))}/>
                            <Input  label="Année Fin"  value={loan.endYear}    onChange={v => updateParam('loans',params.loans.map(l => l.id===loan.id?{...l,endYear:Number(v)}:l))}/>
                          </div>
                          <div className="mt-2"><Input label="Mensualité (€)" value={loan.monthlyPayment} onChange={v => updateParam('loans',params.loans.map(l => l.id===loan.id?{...l,monthlyPayment:Number(v)}:l))}/></div>
                        </div>
                      ))}
                    </div>
                  </Section>
                </div>

                <div className="xl:col-span-4 space-y-6">
                  <Section title="Recettes & Dépenses" icon={<Plus className="w-5 h-5"/>} headerAction={
                    <div className="flex gap-1 md:gap-2 items-center">
                      <AddBtn onClick={() => updateParam('otherIncomes',[...params.otherIncomes,{id:Date.now().toString(),label:'Nouveau Revenu',startMonth:1,startYear:2026,endYear:2040,endMonth:12,initialMonthlyAmount:1000,annualGrowthRate:1,taxRate:15}])} label="+ Rev."/>
                      <AddBtn onClick={() => updateParam('otherExpenses',[...params.otherExpenses,{id:Date.now().toString(),label:'Nouvelle Dépense',startMonth:1,startYear:2026,endYear:2040,endMonth:12,initialMonthlyAmount:500,annualGrowthRate:1}])} label="+ Dép."/>
                    </div>
                  }>
                    <div className="space-y-4">
                      <div className="space-y-2">
                        <h4 className="text-[10px] font-black uppercase text-emerald-600 border-b border-emerald-100 pb-1 flex items-center gap-1"><PlusCircle className="w-3 h-3"/> Revenus</h4>
                        {params.otherIncomes.map(it => (
                          <ItemEditor key={it.id} it={it} type="inc"
                            onDel={() => updateParam('otherIncomes',params.otherIncomes.filter(i => i.id!==it.id))}
                            onUpd={u  => updateParam('otherIncomes',params.otherIncomes.map(i => i.id===it.id?u:i))}/>
                        ))}
                      </div>
                      <div className="space-y-2 mt-4">
                        <h4 className="text-[10px] font-black uppercase text-rose-600 border-b border-rose-100 pb-1 flex items-center gap-1"><MinusCircle className="w-3 h-3"/> Dépenses</h4>
                        {params.otherExpenses.map(it => (
                          <ItemEditor key={it.id} it={it} type="exp"
                            onDel={() => updateParam('otherExpenses',params.otherExpenses.filter(i => i.id!==it.id))}
                            onUpd={u  => updateParam('otherExpenses',params.otherExpenses.map(i => i.id===it.id?u:i))}/>
                        ))}
                      </div>
                    </div>
                  </Section>
                </div>
              </div>
            )}
          </main>

          <style>{`.no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}`}</style>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
